spring.application.name=property-service
server.port=8082

# Database Configuration (Single DB)
spring.datasource.url=jdbc:mysql://localhost:3306/stayease_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=8369251323
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# MySQL-specific settings for BLOB storage
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Other services
services.user-service.url=http://localhost:8081
services.booking-service.url=http://localhost:8083
services.ai-service.url=http://localhost:8084

# File upload config removed - images now stored in database
server.servlet.multipart.max-file-size=5MB
server.servlet.multipart.max-request-size=10MB